# 在 push 到 main 时构建 Docker 镜像并推送到 GitHub Container Registry (ghcr.io)
# 也可在 Actions 页手动运行：Docker build and push to GHCR → Run workflow
name: Docker build and push to GHCR
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./siyuan-mcp
          file: ./siyuan-mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/jairwye/siyuan-mcpj:latest
            ghcr.io/jairwye/siyuan-mcpj:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
