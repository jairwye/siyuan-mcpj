# push/PR 时执行 npm 构建，确保代码可编译
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
        working-directory: siyuan-mcp
      - name: Build
        run: npm run build
        working-directory: siyuan-mcp
