# 说明：
# 1) 本文件仅用于“镜像与环境变量示例”，不是推荐的常驻运行方式。
# 2) siyuan-mcpj 是 stdio MCP，推荐由 mcpo/Cursor 通过 docker run -i 按需拉起。
# 3) 若直接 compose up -d，这个容器通常不会作为长期服务存在，因此 restart 使用 no。
services:
  siyuan-mcpj:
    image: ghcr.io/jairwye/siyuan-mcpj:latest
    container_name: siyuan-mcpj
    restart: "no"
    environment:
      - SIYUAN_HOST=${SIYUAN_HOST:-host.docker.internal}
      - SIYUAN_PORT=${SIYUAN_PORT:-6806}
      - SIYUAN_TOKEN=${SIYUAN_TOKEN}
    # 若思源与 MCP 在同一 docker network，可将 SIYUAN_HOST 设为思源服务名
    # networks:
    #   - default
