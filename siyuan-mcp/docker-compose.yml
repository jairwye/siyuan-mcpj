# 使用镜像地址运行，无需克隆仓库或本地构建
# 镜像名与仓库 siyuan-mcpj 对应（GHCR: ghcr.io/jairwye/siyuan-mcpj）
# 环境变量：从同目录 .env 或运行前 export 传入；SIYUAN_TOKEN 必填，SIYUAN_HOST/PORT 有默认值
version: "3.9"
services:
  siyuan-mcpj:
    image: ghcr.io/jairwye/siyuan-mcpj:latest
    container_name: siyuan-mcpj
    restart: unless-stopped
    environment:
      - SIYUAN_HOST=${SIYUAN_HOST:-host.docker.internal}
      - SIYUAN_PORT=${SIYUAN_PORT:-6806}
      - SIYUAN_TOKEN=${SIYUAN_TOKEN}
    # 若思源与 MCP 在同一 docker network，可将 SIYUAN_HOST 设为思源服务名
    # networks:
    #   - default
